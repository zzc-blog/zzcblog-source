<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ft-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eef4fb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dce8f8;stop-opacity:1"/>
    </linearGradient>
    <pattern id="ft-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(73,177,245,0.1)" stroke-width="0.5"/>
      <circle cx="20" cy="20" r="1.2" fill="rgba(73,177,245,0.12)"/>
    </pattern>
    <pattern id="ft-dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="rgba(0,196,180,0.08)"/>
    </pattern>
  </defs>
  <rect width="1600" height="400" fill="url(#ft-grad)"/>
  <rect width="1600" height="400" fill="url(#ft-grid)"/>
  <rect width="1600" height="400" fill="url(#ft-dots)"/>
</svg>
