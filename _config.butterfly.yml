# Butterfly 主题配置文件
# 文档: https://butterfly.js.org/

# ============================================================
# 导航栏 Navigation
# ============================================================
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  图库: /gallery/ || fas fa-images
  关于||fas fa-heart:
    关于本站: /about/ || fas fa-info-circle

# ============================================================
# 代码块 Code Blocks
# ============================================================
code_blocks:
  theme: darker
  macStyle: true
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: true

# ============================================================
# 社交链接 Social
# ============================================================
social:
  fab fa-github: https://github.com/zzc-blog || Github || '#24292e'

# ============================================================
# 图片 Image
# ============================================================
favicon: /img/butterfly-icon.png

avatar:
  img: /img/butterfly-icon.png
  effect: true

disable_top_img: false
default_top_img: /img/index.jpg
index_img: /img/cover/java.jpg
archive_img: /img/index.jpg
tag_img: /img/index.jpg
category_img: /img/index.jpg

footer_img: /img/footer-bg.svg
background: /img/bg-day.svg

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/cover/java.jpg
    - /img/cover/database.jpg
    - /img/cover/frontend.jpg
    - /img/cover/tools.jpg
    - /img/cover/other.jpg
    - /img/cover/essay.jpg
    - /img/cover/reading.jpg

error_img:
  flink: /img/error-page.svg
  post_page: /img/default_top_img.svg

error_404:
  enable: true
  subtitle: '页面没有找到...'
  background: /img/index.jpg

# ============================================================
# 文章元数据 Post Meta
# ============================================================
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: center
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# ============================================================
# 首页设置 Index Page
# ============================================================
index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
  source: 1
  sub:
    - 记录技术成长，分享编程心得
    - 专注 Java 后端开发
    - 路漫漫其修远兮，吾将上下而求索

index_layout: 3

index_post_content:
  method: 2
  length: 500

# ============================================================
# 文章设置 Post Settings
# ============================================================
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false
  text:
  QR_code:

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 本文最后更新于
  message_next: 天前，部分内容可能已过时，请注意辨别。

# ============================================================
# 页脚 Footer
# ============================================================
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text: '<i class="fas fa-heart" style="color: #FF7242"></i> 保持热爱，奔赴山海'

# ============================================================
# 侧边栏 Aside（仿官方站风格）
# ============================================================
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 一个热爱编程的后端开发者
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/zzc-blog
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！这里主要分享技术和生活。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date: 2026/05/20 00:00:00

# ============================================================
# 右下角按钮 Right Side
# ============================================================
rightside_bottom:
translate:
  enable: true
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '简'

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: 1
  start:
  end:

rightside_scroll_percent: true

rightside_item_order:
  enable: false
  hide:
  show:

rightside_config_animation: true

# ============================================================
# 全局设置 Global
# ============================================================
anchor:
  auto_update: true
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# ============================================================
# 数学公式 Math
# ============================================================
math:
  use: katex
  per_page: true
  hide_scrollbar: false
  mathjax:
    enableMenu: true
    tags: none
  katex:
    copy_tex: false

# ============================================================
# 搜索 Search
# ============================================================
search:
  use: local_search
  placeholder: 搜索文章...
  algolia_search:
    hitsPerPage: 6
  local_search:
    preload: true
    top_n_per_article: 1
    unescape: true
    pagination:
      enable: true
      hitsPerPage: 8
    CDN:
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# ============================================================
# 分享 Share
# ============================================================
share:
  use: sharejs
  sharejs:
    sites: wechat,weibo,qq,qzone
  addtoany:
    item: wechat,sina_weibo,facebook_messenger,email,copy_link

# ============================================================
# 评论区 Comments（暂不启用）
# ============================================================
comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

# ============================================================
# 美化 / 特效 Beautify / Effect
# ============================================================
theme_color:
  enable: true
  main: '#49B1F5'
  paginator: '#00c4b6'
  button_hover: '#FF7242'
  text_selection: '#00c4b6'
  link_color: '#99a9bf'
  meta_color: '#858585'
  hr_color: '#A4D8FA'
  code_foreground: '#F47466'
  code_background: 'rgba(27, 31, 35, .05)'
  toc_color: '#00c4b6'
  blockquote_padding_color: '#49b1f5'
  blockquote_background_color: '#49b1f5'
  scrollbar_color: '#49b1f5'
  meta_theme_color_light: 'ffffff'
  meta_theme_color_dark: '#0d0d0d'

category_ui: index
tag_ui: index

rounded_corners_ui: true
text_align_justify: false

mask:
  header: true
  footer: false

preloader:
  enable: true
  source: 1
  pace_css_url:

enter_transitions: true
display_mode: light

beautify:
  enable: true
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#F47466'

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true
  icon:
  icon_top:

activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

canvas_ribbon:
  enable: false
  size: 150
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

canvas_fluttering_ribbon:
  enable: false
  mobile: false

canvas_nest:
  enable: true
  color: '0,0,255'
  opacity: 0.5
  zIndex: -1
  count: 99
  mobile: false

fireworks:
  enable: false
  zIndex: 9999
  mobile: false

click_heart:
  enable: true
  mobile: false

clickShowText:
  enable: false
  text:
  fontSize: 15px
  random: false
  mobile: false

# ============================================================
# 灯箱 Lightbox
# ============================================================
lightbox: fancybox

# ============================================================
# 标签插件 Tag Plugins
# ============================================================
series:
  enable: true
  orderBy: 'date'
  order: -1
  number: true

abcjs:
  enable: false
  per_page: true

mermaid:
  enable: true
  code_write: false
  theme:
    light: default
    dark: dark
  open_in_new_tab: true
  zoom_pan: true

chartjs:
  enable: false
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# ============================================================
# 其他设置 Other
# ============================================================
pjax:
  enable: true
  exclude:

aplayerInject:
  enable: false
  per_page: true

snackbar:
  enable: true
  position: bottom-left
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

instantpage: true

lazyload:
  enable: true
  native: false
  field: site
  placeholder:
  blur: false

pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

Open_Graph_meta:
  enable: true
  option:

structured_data:
  enable: true
  alternate_name:

css_prefix: true

# ============================================================
# 注入代码 Inject
# ============================================================
inject:
  head:
    - <style>#footer,#footer a,#footer .copyright,#footer .framework-info,#footer .footer_custom_text{color:#555}#footer a:hover{color:#49B1F5}</style>
  bottom:

# ============================================================
# CDN 设置
# ============================================================
CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
  custom_format:
  option:
