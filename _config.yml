# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: zzc-blog
subtitle: ''
description: ''
keywords:
author: zzc-blog
language: zh-CN
timezone: Asia/Shanghai

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'

permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang


# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
#theme: landscape
theme: butterfly


# Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: /img/butterfly-icon.png

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment

url: https://blog.zzc.dpdns.org
deploy:
  type: git
  repo: git@github.com:zzc-blog/zzc-blog.github.io.git
  branch: gh-pages
  message: 'Site updated: {{ now("yyyy-MM-dd HH:mm:ss") }}' 

skip_render:
  - 'CNAME'
  
  
# https://github.com/RayKr/hexo-auto-front-matter
auto_front_matter:
  enable: true

  # 控制 front-matter 字段的显示顺序（可选）
  # 留空则保持原文件中字段的先后顺序
  order:
    - title
    - date
    - categories
    - tags
    - cover
    - description

  # ---- 自动标题 ----
  auto_title:
    enable: true
    mode: 1   # 1=仅当 title 为空时自动填入；2=始终覆盖

  # ---- 自动日期 ----
  auto_date:
    enable: true

  # ---- 自动分类 ----
  # 逻辑同 hexo-auto-category，从文章所在文件夹路径推断分类
  auto_categories:
    enable: false
    multiple: false   # false=将文件夹路径作为单级分类；true=每层文件夹作为一个分类层级
    depth:            # 不填则取全部文件夹层级；填数字则只取前 N 层

  # ---- 自动标签 ----
  # 当 tags 字段为空时，自动把 categories 的内容复制到 tags
  auto_tags:
    enable: true

  # ---- 自动封面 ----
  # 根据最深层的分类名称匹配封面图片路径
  auto_cover:
    enable: true
    per_category:
      # 格式：父分类: { 子分类: 图片路径 }
      技术:
        Java: /img/cover/java.jpg
        数据库: /img/cover/database.jpg
        前端: /img/cover/frontend.jpg
        工具: /img/cover/tools.jpg
        其他: /img/cover/other.jpg
      生活:
        随笔: /img/cover/essay.jpg
        阅读: /img/cover/reading.jpg